<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>el.ia — prueba del agente</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { background:#050505; height:100%; }
  body { font-family:'Segoe UI',Inter,sans-serif; color:#fff; display:flex; flex-direction:column; align-items:center; padding:48px 20px; }
  .badge { display:inline-flex; align-items:center; gap:8px; padding:6px 14px; border:1px solid rgba(0,255,163,0.35); border-radius:999px; font-size:12px; letter-spacing:2px; text-transform:uppercase; color:#00ffa3; margin-bottom:18px; }
  .dot { width:6px; height:6px; border-radius:50%; background:#00ffa3; display:inline-block; animation:blink 1.4s infinite; }
  @keyframes blink { 0%,80%,100%{opacity:0.25;} 40%{opacity:1;} }
  h1 { font-size:32px; font-weight:800; margin-bottom:8px; text-align:center; }
  h1 span { background:linear-gradient(90deg,#00ffa3,#17f9ff); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  p.sub { color:#9a9a9a; font-size:14px; margin-bottom:32px; text-align:center; max-width:480px; }
  .chat-shell { width:100%; max-width:640px; border:1px solid rgba(255,255,255,0.1); border-radius:20px; overflow:hidden; background:rgba(255,255,255,0.02); }
  .chat-body { height:380px; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:10px; }
  .row { display:flex; }
  .row.user { justify-content:flex-end; }
  .bubble { max-width:78%; padding:11px 15px; border-radius:16px; font-size:14px; line-height:1.5; }
  .bubble.assistant { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.08); border-bottom-left-radius:4px; color:#e8e8e8; }
  .bubble.user { background:linear-gradient(135deg,#00ffa3,#17f9ff); color:#032; font-weight:500; border-bottom-right-radius:4px; }
  .chat-input { display:flex; gap:10px; padding:14px 16px; border-top:1px solid rgba(255,255,255,0.08); background:rgba(0,0,0,0.25); cursor:text; }
  .chat-input input { flex:1; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.12); border-radius:10px; padding:12px 14px; color:#fff; font-size:14px; outline:none; pointer-events:auto; user-select:text; -webkit-user-select:text; position:relative; z-index:1; }
  .chat-input button { border:none; border-radius:10px; padding:0 18px; background:linear-gradient(135deg,#00ffa3,#17f9ff); color:#031; font-weight:700; cursor:pointer; }
  .chat-input button:disabled { opacity:0.5; cursor:default; }
  .status { margin-top:16px; font-size:12px; color:#6a6a6a; text-align:center; max-width:520px; }
  .status.err { color:#ff8a8a; }
</style>
</head>
<body>
  <div class="badge"><span class="dot"></span>Prueba del agente · Netlify Function</div>
  <h1>Hola, soy <span>el.ia</span></h1>
  <p class="sub">Página de verificación del backend. Sirve para confirmar que la función de Netlify y la API key funcionan antes de conectar el chat a la web real.</p>

  <div class="chat-shell">
    <div class="chat-body" id="chatBody"></div>
    <div class="chat-input" id="chatInputRow">
      <input id="chatInput" type="text" placeholder="Escribe tu mensaje..." autocomplete="off" autofocus>
      <button id="chatSend">Enviar</button>
    </div>
  </div>
  <p class="status" id="status">Conectando con /.netlify/functions/chat …</p>

<script>
  const ENDPOINT = '/.netlify/functions/chat';
  const chatBody = document.getElementById('chatBody');
  const input = document.getElementById('chatInput');
  const inputRow = document.getElementById('chatInputRow');
  const sendBtn = document.getElementById('chatSend');
  const statusEl = document.getElementById('status');

  // Red de seguridad: si el clic/touch no enfoca el input de forma nativa
  // (por alguna interferencia externa a la página), forzamos el foco.
  ['click', 'touchend'].forEach((evt) => {
    inputRow.addEventListener(evt, (e) => {
      if (e.target !== sendBtn && document.activeElement !== input) {
        input.focus();
      }
    });
  });

  let history = [
    { role: 'assistant', text: '¡Hola! Soy el.ia. Pregúntame algo para comprobar que el agente responde correctamente.' }
  ];

  function render() {
    chatBody.innerHTML = '';
    for (const m of history) {
      const row = document.createElement('div');
      row.className = 'row ' + m.role;
      const bubble = document.createElement('div');
      bubble.className = 'bubble ' + m.role;
      bubble.textContent = m.text;
      row.appendChild(bubble);
      chatBody.appendChild(row);
    }
    chatBody.scrollTop = chatBody.scrollHeight;
  }

  async function askElia(msgs) {
    const payload = { messages: msgs.map(m => ({ role: m.role, content: m.text })) };
    const res = await fetch(ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
    return data.reply;
  }

  async function send() {
    const text = input.value.trim();
    if (!text) return;
    history.push({ role: 'user', text });
    input.value = '';
    sendBtn.disabled = true;
    render();
    statusEl.className = 'status';
    statusEl.textContent = 'el.ia está escribiendo…';
    try {
      const reply = await askElia(history);
      history.push({ role: 'assistant', text: reply || '(sin respuesta)' });
      statusEl.textContent = 'Conectado correctamente a ' + ENDPOINT;
    } catch (e) {
      history.push({ role: 'assistant', text: 'Error: ' + e.message });
      statusEl.className = 'status err';
      statusEl.textContent = 'Fallo al llamar a la función: ' + e.message + '. Revisa ANTHROPIC_API_KEY en Netlify.';
    } finally {
      sendBtn.disabled = false;
      render();
    }
  }

  sendBtn.addEventListener('click', send);
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });
  statusEl.textContent = 'Escribe un mensaje para probar el agente.';
  render();
</script>
</body>
</html>
